<!DOCTYPE html>
<html>
<head>
    <title>SMS BULK SENDER</title>

    <style>
        body {
            font-family: Arial;
            margin: 30px;
            background: #f8f9fa;
        }

        h2 {
            color: #333;
        }

        textarea {
            width: 450px;
            height: 120px;
            padding: 10px;
            margin: 10px 0;
            border: 1px solid #ccc;
            border-radius: 6px;
        }

        button {
            padding: 12px 25px;
            background: #007bff;
            color: white;
            border: none;
            cursor: pointer;
            border-radius: 5px;
            font-size: 16px;
        }

        button:hover {
            background: #0056b3;
        }

        #result {
            margin-top: 20px;
            background: #fff;
            padding: 15px;
            border: 1px solid #ddd;
            white-space: pre-wrap;
            border-radius: 6px;
        }
    </style>
</head>

<body>

<h2>📩 Bulk SMS Sender</h2>

<label>Phone Numbers (comma separated)</label><br>
<textarea id="numbers" placeholder="2547xxxxxxx,2547xxxxxxx"></textarea>

<br>

<label>Message</label><br>
<textarea id="message" placeholder="Type your message here"></textarea>

<br>

<button onclick="sendSMS()">Send SMS</button>

<div id="result"></div>
<table id="resultsTable" border="1" style="margin-top:20px; width:100%; border-collapse: collapse;">
    <thead>
        <tr>
            <th>Number</th>
            <th>Status</th>
            <th>Response</th>
        </tr>
    </thead>
    <tbody></tbody>
</table>

<script>
function sendSMS() {

    const numbersRaw = document.getElementById("numbers").value;
    const message = document.getElementById("message").value;

    const numbers = numbersRaw
        .split(",")
        .map(n => n.trim())
        .filter(n => n.length > 0);

    document.getElementById("result").innerText = "Sending...";

    fetch("/api/send_sms", {
        method: "POST",
        headers: {
            "Content-Type": "application/json",
            "X-API-KEY": "YOUR_SECRET_API_KEY"
        },
        body: JSON.stringify({
            numbers: numbers,
            message: message
        })
    })
    .then(async res => {

        const text = await res.text();

        console.log("STATUS:", res.status);
        console.log("RAW RESPONSE:", text);

        let data;

        try {
            data = JSON.parse(text);
        } catch (e) {
            document.getElementById("result").innerText =
                "Server returned HTML instead of JSON:\n\n" + text;
            return;
        }

        document.getElementById("result").innerText =
            JSON.stringify(data, null, 2);

        const tbody = document.querySelector("#resultsTable tbody");
        tbody.innerHTML = "";

        if (data.results) {

            data.results.forEach(item => {

                const row = document.createElement("tr");

                row.innerHTML = `
                    <td>${item.number}</td>
                    <td>${item.status}</td>
                    <td>${JSON.stringify(item.response || item.error)}</td>
                `;

                tbody.appendChild(row);
            });

        }
    })
    .catch(err => {

        console.error(err);

        document.getElementById("result").innerText =
            "ERROR: " + err;
    });
}
</script>

</body>
</html>
